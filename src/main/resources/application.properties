spring.application.name=project-shield-service
server.port=8080

# Jackson
spring.jackson.mapper.accept-case-insensitive-enums=true

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway - disabled, run manually via ./gradlew flywayMigrate
spring.flyway.enabled=false

# Clerk OAuth2 JWT Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=${CLERK_ISSUER_URI:https://placeholder.clerk.accounts.dev}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${CLERK_ISSUER_URI:https://placeholder.clerk.accounts.dev}/.well-known/jwks.json

# Clerk Backend API
clerk.api.base-url=https://api.clerk.com/v1

# Resend Email
resend.from-email=noreply@projectshield.app

# Frontend URL (for invitation links)
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
