spring.datasource.url=jdbc:h2:mem:testdb_${random.uuid};DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.flyway.enabled=false

# Disable OAuth2 resource server for tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# Placeholder values for security config (not used when OAuth2 is disabled)
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://test.clerk.accounts.dev
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://test.clerk.accounts.dev/.well-known/jwks.json
